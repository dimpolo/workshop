<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Frieren's Forecast - Vibe Coding Workshop</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h2>Frieren's Forecast</h2>
    <p>
      An ancient elf mage reports today's weather in Stuttgart, Germany -
      with about as much enthusiasm as you'd expect from someone who has
      already seen ten thousand of them.
    </p>

    <div class="forecast-stage">
      <div class="sky">
        <svg class="cloud" id="cloud" viewBox="0 0 120 105" aria-hidden="true">
          <g class="cloud-shape">
            <rect x="15" y="45" width="90" height="26" rx="13"></rect>
            <circle cx="30" cy="44" r="20"></circle>
            <circle cx="56" cy="30" r="26"></circle>
            <circle cx="85" cy="42" r="20"></circle>
            <circle cx="101" cy="53" r="14"></circle>
          </g>
          <g class="rain">
            <line x1="35" y1="76" x2="27" y2="90"></line>
            <line x1="55" y1="78" x2="47" y2="94"></line>
            <line x1="75" y1="78" x2="67" y2="94"></line>
            <line x1="95" y1="76" x2="87" y2="90"></line>
          </g>
          <g class="bolt">
            <polygon points="62,58 48,84 60,84 54,102 80,70 66,70"></polygon>
          </g>
        </svg>

        <svg class="frieren" viewBox="0 0 200 320" aria-hidden="true">
          <ellipse class="hair-back" cx="60" cy="210" rx="28" ry="130"></ellipse>
          <ellipse class="hair-back" cx="140" cy="210" rx="28" ry="130"></ellipse>
          <ellipse class="hair-cap" cx="100" cy="72" rx="50" ry="42"></ellipse>

          <polygon class="ear" points="52,92 30,78 50,112"></polygon>
          <polygon class="ear" points="148,92 170,78 150,112"></polygon>
          <circle class="head" cx="100" cy="92" r="42"></circle>

          <path class="fringe" d="M56,62 Q100,38 144,62 L144,90 Q100,78 56,90 Z"></path>

          <polygon class="sleeve" points="66,132 38,164 54,224 82,202"></polygon>
          <polygon class="sleeve" points="134,132 162,164 146,224 118,202"></polygon>
          <path class="cloak" d="M66,132 L134,132 L166,300 L34,300 Z"></path>
          <path class="collar" d="M80,126 L120,126 L129,148 L71,148 Z"></path>
          <polygon class="brooch" points="100,150 109,161 100,172 91,161"></polygon>

          <ellipse class="eye" cx="82" cy="97" rx="7" ry="3.2"></ellipse>
          <ellipse class="eye" cx="118" cy="97" rx="7" ry="3.2"></ellipse>
          <line class="mouth" x1="92" y1="116" x2="108" y2="116"></line>
        </svg>

        <div class="speech-bubble">
          <p id="frieren-line">Checking the sky. This takes a moment, even for me.</p>
        </div>
      </div>

      <div class="weather-info">
        <p id="weather-status">Loading Stuttgart's skies&hellip;</p>
        <p class="weather-temp"><span id="weather-temp">--</span>&deg;C</p>
        <p id="weather-condition">--</p>
      </div>
    </div>
  </main>

  <script src="../../shared/layout.js" defer></script>
  <script src="script.js" defer></script>
</body>
</html>
