<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ingos Tetris - Vibe Coding Workshop</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h2>Ingos Tetris</h2>
    <p>Ein ganz einfaches Tetris mit fester Steinreihenfolge.</p>

    <div id="game">
      <canvas id="board" width="200" height="400"></canvas>

      <div class="side">
        <p>Punkte: <span id="score">0</span></p>
        <div id="start-screen" class="screen">
          <button id="start-btn">Start</button>
        </div>
        <div id="gameover-screen" class="screen hidden">
          <p>Game Over</p>
          <button id="restart-btn">Nochmal spielen</button>
        </div>
        <p class="controls">
          ← → bewegen<br>
          ↓ schneller fallen<br>
          ↑ drehen
        </p>
        <button id="mute-btn" type="button">🔊</button>
      </div>
    </div>
  </main>

  <script src="../../shared/layout.js" defer></script>
  <script src="game.js" defer></script>
</body>
</html>
